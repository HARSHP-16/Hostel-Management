{% extends 'base.html' %}

{% block title %}Change Password | HMS{% endblock %}

{% block head %}
<style>
    .auth-container {
        max-width: 480px;
        margin: 3rem auto;
        padding: 2.5rem;
        border-radius: 16px;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-header h2 {
        color: var(--primary);
        font-size: 1.8rem;
        margin-bottom: 0.5rem;
    }

    .form-group {
        margin-bottom: 1.5rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--dark);
    }

    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.9);
        color: var(--text-main);
    }

    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }

    [data-theme='dark'] .form-control {
        background: rgba(15, 23, 42, 0.6);
        color: #F1F5F9;
    }

    .btn-block {
        width: 100%;
        padding: 0.75rem;
        font-size: 1.1rem;
        margin-top: 1rem;
    }

    .password-rules {
        font-size: 0.85rem;
        color: var(--gray);
        margin-top: 0.4rem;
    }

    @media (max-width: 480px) {
        .auth-container { margin: 1rem; padding: 1.5rem; }
    }
</style>
{% endblock %}

{% block content %}
<a href="{{ url_for(role + '_dashboard') }}" style="color: var(--gray); text-decoration: none; display: inline-block; margin-bottom: 1rem;">
    <i class="fa-solid fa-arrow-left"></i> Back to Dashboard
</a>

<div class="auth-container glass">
    <div class="auth-header">
        <div style="width: 64px; height: 64px; background: rgba(79, 70, 229, 0.1); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin: 0 auto 1rem auto;">
            <i class="fa-solid fa-key"></i>
        </div>
        <h2>Change Password</h2>
        <p style="color: var(--gray);">Update your account password</p>
    </div>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="form-group">
            <label class="form-label" for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" class="form-control"
                   required placeholder="Enter your current password">
        </div>

        <div class="form-group">
            <label class="form-label" for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" class="form-control"
                   required minlength="8" placeholder="Choose a strong new password">
            <p class="password-rules"><i class="fa-solid fa-circle-info"></i> Must be at least 8 characters.</p>
        </div>

        <div class="form-group">
            <label class="form-label" for="confirm_password">Confirm New Password</label>
            <input type="password" id="confirm_password" name="confirm_password" class="form-control"
                   required minlength="8" placeholder="Repeat your new password">
        </div>

        <button type="submit" class="btn btn-primary btn-block">
            <i class="fa-solid fa-lock"></i> Update Password
        </button>
    </form>
</div>

<script>
document.querySelector('form').addEventListener('submit', function(e) {
    const np = document.getElementById('new_password').value;
    const cp = document.getElementById('confirm_password').value;
    if (np !== cp) {
        e.preventDefault();
        alert('New passwords do not match. Please try again.');
    }
});
</script>
{% endblock %}
