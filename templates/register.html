{% extends 'base.html' %}

{% block title %}Register | Hostel Management System{% endblock %}

{% block head %}
<style>
    .auth-container {
        max-width: 550px;
        margin: 2rem auto;
        padding: 2.5rem;
    }
    
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    
    .auth-header h2 {
        color: var(--primary);
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }
    
    .form-row {
        display: flex;
        gap: 1rem;
    }
    
    .form-row .form-group {
        flex: 1;
    }
    
    .form-group {
        margin-bottom: 1.25rem;
    }
    
    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 500;
        color: var(--gray);
    }
    
    .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 1px solid #E5E7EB;
        border-radius: 8px;
        font-size: 1rem;
        transition: all 0.3s ease;
        background: rgba(255, 255, 255, 0.9);
    }
    
    .form-control:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
    }
    
    .btn-block {
        width: 100%;
        padding: 0.75rem;
        font-size: 1.1rem;
        margin-top: 1rem;
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        color: var(--gray);
    }
    
    .auth-footer a {
        color: var(--primary);
        font-weight: 500;
        text-decoration: none;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
</style>
<script>
    function toggleFields() {
        const role = document.getElementById('role').value;
        const studentFields = document.getElementById('student-fields');
        if (role === 'student') {
            studentFields.style.display = 'block';
        } else {
            studentFields.style.display = 'none';
        }
    }
</script>
{% endblock %}

{% block content %}
<div class="auth-container glass">
    <div class="auth-header">
        <h2>Create an Account</h2>
        <p>Join the hostel management portal</p>
    </div>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label class="form-label" for="role">Register As</label>
            <select id="role" name="role" class="form-control" onchange="toggleFields()" required>
                <option value="student">Student</option>
                <option value="warden">Warden</option>
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="John Doe">
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" name="email" class="form-control" required placeholder="john@example.com">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="phone">Phone Number</label>
                <input type="text" id="phone" name="phone" class="form-control" placeholder="+1 234 567 8900">
            </div>
        </div>
        
        <div class="form-group">
            <label class="form-label" for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Create a strong password">
        </div>
        
        <!-- Student-specific fields -->
        <div id="student-fields">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="gender">Gender</label>
                    <select id="gender" name="gender" class="form-control">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label" for="course">Course</label>
                    <input type="text" id="course" name="course" class="form-control" placeholder="Computer Science">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="address">Address</label>
                <textarea id="address" name="address" class="form-control" rows="2" placeholder="Home address"></textarea>
            </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block">Register</button>
    </form>
    
    <div class="auth-footer">
        <p>Already have an account? <a href="{{ url_for('login') }}">Sign in here</a></p>
    </div>
</div>
{% endblock %}
